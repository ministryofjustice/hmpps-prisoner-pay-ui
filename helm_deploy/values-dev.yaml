generic-service:
  replicaCount: 2

  ingress:
    host: prisoner-pay-dev.prison.service.justice.gov.uk

  env:
    INGRESS_URL: "https://prisoner-pay-dev.prison.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-dev.prison.service.justice.gov.uk"
    COMPONENT_API_URL: "https://frontend-components-dev.hmpps.service.justice.gov.uk"
    PRISON_API_URL: "https://prison-api-dev.prison.service.justice.gov.uk"
    PRISONER_SEARCH_API_URL: "https://prisoner-search-dev.prison.service.justice.gov.uk"
    DIGITAL_PRISON_SERVICE_URL: "https://digital-dev.prison.service.justice.gov.uk"
    ACTIVITIES_UI_URL: "https://activities-dev.prison.service.justice.gov.uk/activities"
    PAY_ORCHESTRATOR_API_URL: "https://prisoner-pay-orchestrator-api-dev.hmpps.service.justice.gov.uk"
    PRISONER_PAY_API_URL: "https://prisoner-pay-api-dev.hmpps.service.justice.gov.uk"
    ENVIRONMENT_NAME: DEV
    AUDIT_ENABLED: "false"
