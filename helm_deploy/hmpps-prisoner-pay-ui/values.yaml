generic-service:
  nameOverride: hmpps-prisoner-pay-ui
  serviceAccountName: hmpps-prisoner-pay # required for HMPPS Audit
  productId: 'DPS028' # productId for the product that this belongs too, i.e. DPS001, see README.md for details

  # the IRSA service account name for accessing AWS resources
  # serviceAccountName: "hmpps-prisoner-pay-ui"

  replicaCount: 4

  image:
    repository: ghcr.io/ministryofjustice/hmpps-prisoner-pay-ui
    tag: app_version # override at deployment time
    port: 3000

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: prisoner-pay-ui-cert

  livenessProbe:
    httpGet:
      path: /ping

  readinessProbe:
    httpGet:
      path: /ping

  # Environment variables to load into the deployment
  env:
    NODE_ENV: 'production'
    REDIS_ENABLED: 'true'
    REDIS_TLS_ENABLED: 'true'
    TOKEN_VERIFICATION_ENABLED: 'true'
    AUDIT_SQS_REGION: 'eu-west-2'
    AUDIT_SERVICE_NAME: 'hmpps-prisoner-pay-ui'
    HTTP_PROXY: 'http://envoy-https-proxy:3128'
    HTTPS_PROXY: 'http://envoy-https-proxy:3128'
    NO_PROXY: 'localhost,127.0.0.1,envoy-https-proxy,.svc,.cluster.local'

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    hmpps-prisoner-pay:
      AUTH_CODE_CLIENT_ID: 'AUTH_CODE_CLIENT_ID'
      AUTH_CODE_CLIENT_SECRET: 'AUTH_CODE_CLIENT_SECRET'
      CLIENT_CREDS_CLIENT_ID: 'CLIENT_CREDS_CLIENT_ID'
      CLIENT_CREDS_CLIENT_SECRET: 'CLIENT_CREDS_CLIENT_SECRET'
    hmpps-prisoner-pay-ui-session-secret:
      SESSION_SECRET: 'SESSION_SECRET'
    elasticache-redis:
      REDIS_HOST: 'primary_endpoint_address'
      REDIS_AUTH_TOKEN: 'auth_token'
    hmpps-prisoner-pay-ui-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"
    # This secret will need to be created in your namespace (note it isn't in hmpps-templates-dev)
    # IRSA configuration in your namespace will also be required, and then uncomment serviceAccountName above.
    sqs-hmpps-audit-secret:
      AUDIT_SQS_QUEUE_URL: 'sqs_queue_url'
      AUDIT_SQS_QUEUE_NAME: 'sqs_queue_name'

  allowlist:
    groups:
      - internal

generic-prometheus-alerts:
  targetApplication: hmpps-prisoner-pay-ui

envoy:
  enabled: true
  deploymentName: envoy-https-proxy
  configMapName: envoy-https-proxy-config
  serviceName: envoy-https-proxy
  replicas: 2
  logLevel: info
  image:
    repository: envoyproxy/envoy
    tag: v1.33-latest
  ports:
    proxy: 3128
    admin: 9901
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  allowedHosts:
    exact:
      - sqs.eu-west-2.amazonaws.com
      - agent.azureserviceprofiler.net
      - sts.eu-west-2.amazonaws.com
    suffixes:
      - .in.applicationinsights.azure.com
      - .livediagnostics.monitor.azure.com
  allowedHostEnvVars:
    - HMPPS_AUTH_URL
    - TOKEN_VERIFICATION_API_URL
    - COMPONENT_API_URL
    - PRISON_API_URL
    - PAY_ORCHESTRATOR_API_URL
    - PRISONER_PAY_API_URL
    - PRISONER_SEARCH_API_URL
